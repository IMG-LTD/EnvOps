spring:
  application:
    name: envops
  datasource:
    url: jdbc:h2:mem:envops;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  h2:
    console:
      enabled: false

envops:
  security:
    token-secret: ${ENVOPS_SECURITY_TOKEN_SECRET:envops-phase1-demo-token-secret-change-me-12345}
    credential-protection-secret: ${ENVOPS_CREDENTIAL_PROTECTION_SECRET:envops-phase1-demo-credential-protection-secret-change-me}

