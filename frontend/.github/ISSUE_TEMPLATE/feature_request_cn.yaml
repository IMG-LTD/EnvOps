---
name: 功能请求
description: 提出一个想法以帮助我们改进 EnvOps
title: '[功能]: '
labels:
  - '功能请求'

body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间提交 EnvOps 功能请求。

        提交前请先搜索当前仓库中的现有 issue。
        仓库整体背景与贡献说明请参阅仓库根目录 `README.md`。

  - type: textarea
    attributes:
      label: 描述
      description: |
        对您感兴趣的功能的清晰简洁描述。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 建议的解决方案
      description: |
        描述您希望采用的解决方案，以及您期望发生的结果。
    validations:
      required: true

  - type: textarea
    attributes:
      label: 替代方案
      description: |
        描述您考虑过的替代方案。
        也可以补充您评估过的其他实现方向或功能方案。
    validations:
      required: false

  - type: textarea
    attributes:
      label: 额外的上下文
      description: |
        在此处补充与该问题相关的其他上下文。
    validations:
      required: false
