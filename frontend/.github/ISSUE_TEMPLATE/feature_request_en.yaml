---
name: Feature Request
description: Suggest an idea to help improve EnvOps
title: '[Feature]: '
labels:
  - 'feature_request'

body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to share a feature request for EnvOps.

        Please search existing issues in this repository before submitting a new request.
        For overall project context and contribution guidance, refer to the repository root `README.md`.

  - type: textarea
    attributes:
      label: Description
      description: |
        A clear and concise description of the feature you're interested in.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Suggested Solution
      description: |
        Describe the solution you'd like. A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives
      description: |
        Describe alternatives you've considered.
        A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional Context
      description: |
        Add any other context about the problem here.
    validations:
      required: false
